<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
        crossorigin="anonymous"
    />
    <title>Painter</title>
</head>
<body class="bg-dark bg-gradient">
    <div class="container">
        <aside class="sidebar">
            <!-- 기본 드로잉 툴 -->
            <button class="tool-btn btn btn-light w-100 mb-2 active" data-tool="brush" title="브러시">🖌️</button>
            <button class="tool-btn btn btn-outline-light w-100 mb-2" data-tool="line" title="직선">╱</button>

            <hr class="border-secondary my-2"/>

            <!-- Mystical 링 툴 -->
            <span class="sidebar-label">Mystical</span>
            <button class="tool-btn btn btn-outline-light w-100 mb-2" data-tool="xarray" title="Executable Array { }">{ }</button>
            <button class="tool-btn btn btn-outline-light w-100 mb-2" data-tool="array"  title="Array [ ]">[ ]</button>
            <button class="tool-btn btn btn-outline-light w-100 mb-2" data-tool="dict"       title="Dictionary ⟪ ⟫">⬡</button>

            <hr class="border-secondary my-2"/>

            <!-- 액션 버튼 -->
            <button id="save-btn"  class="btn btn-outline-light w-100 mb-2" title="PNG로 저장">💾</button>
            <button id="clear-btn" class="btn btn-outline-light w-100"      title="전체 지우기">🗑️</button>
        </aside>

        <main class="main-content">
            <canvas id="main-canvas" class="main-canvas"></canvas>
            <div class="controls">
                <label class="controls-label text-light" for="range-input">굵기</label>
                <input type="range" id="range-input" min="0.1" max="20" value="1.0" step="0.1"/>
                <label class="controls-label text-light" for="color-input">색상</label>
                <input type="color" id="color-input" value="#000000"/>
            </div>
        </main>

        <!-- ── 결과 패널 ── -->
        <aside class="result-panel">
            <!-- 모드 선택 -->
            <div class="result-section">
                <label class="result-label" for="render-mode">렌더 모드</label>
                <select id="render-mode" class="render-select">
                    <option value="magic">✨ Mystical (magic)</option>
                    <option value="normal">▶ PostScript (normal)</option>
                </select>
            </div>

            <!-- PS 코드 출력 -->
            <div class="result-section">
                <span class="result-label">PostScript 코드</span>
                <pre id="ps-output" class="ps-output">(기호를 그려보세요)</pre>
            </div>

            <!-- 렌더링 결과 -->
            <div class="result-section">
                <span class="result-label">렌더링 결과</span>
                <span id="render-status" class="render-status">대기 중</span>
                <img id="render-img" class="render-img" alt="렌더링 결과" style="display:none"/>
            </div>
        </aside>
    </div>
    <script>const LAMBDA_URL = "https://pnn0m9j6w7.execute-api.ap-northeast-2.amazonaws.com/render";</script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
